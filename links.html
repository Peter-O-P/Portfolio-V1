<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Links - Project Manager Portfolio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💼</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  @font-face {
    font-family: 'Datatype';
    src: url('https://fonts.cdnfonts.com/s/15651/Datatype.woff') format('woff');
  }
  :root {
    --bg:#080B12; --bg2:#0E1220; --card:#111520; --card-hover:#181E30;
    --border:rgba(255,255,255,0.06); --border-hover:rgba(99,179,255,0.3);
    --accent:#3B82F6; --accent2:#06EEFF; --text:#E8ECF4; --muted:#7A8499;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;
    font-weight:300;min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:40px 24px;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none;z-index:0;opacity:0.5}
  body::after{content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);
    background-size:80px 80px;pointer-events:none;
    mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent);z-index:0}
  .glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);
    width:600px;height:500px;
    background:radial-gradient(ellipse,rgba(59,130,246,0.12) 0%,transparent 70%);
    pointer-events:none;z-index:0}
  .container{position:relative;z-index:1;width:100%;max-width:480px;
    display:flex;flex-direction:column;align-items:center}
  .back-link{align-self:flex-start;font-family:'DM Mono',monospace;font-size:11px;
    font-weight:500;color:var(--muted);text-decoration:none;text-transform:uppercase;
    letter-spacing:0.1em;margin-bottom:48px;display:flex;align-items:center;gap:8px;transition:color 0.2s}
  .back-link:hover{color:var(--text)}
  .back-link::before{content:'<-';font-size:13px}
  .profile-badge{display:inline-flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;
    font-size:11px;font-weight:500;color:var(--accent2);background:rgba(6,238,255,0.08);
    border:1px solid rgba(6,238,255,0.15);padding:6px 16px;border-radius:100px;margin-bottom:28px;
    letter-spacing:0.1em;text-transform:uppercase;animation:fadeUp 0.5s ease both}
  .profile-badge::before{content:'';width:6px;height:6px;border-radius:50%;
    background:var(--accent2);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .profile-name{font-family:'Datatype',monospace;font-size:clamp(36px,8vw,56px);
    font-weight:800;letter-spacing:-2px;line-height:1;text-align:center;margin-bottom:10px;
    animation:fadeUp 0.5s 0.05s ease both}
  .profile-role{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted);
    text-transform:uppercase;letter-spacing:0.12em;text-align:center;margin-bottom:48px;
    animation:fadeUp 0.5s 0.1s ease both}
  .links-list{width:100%;display:flex;flex-direction:column;gap:12px;margin-bottom:48px}
  .link-btn{display:flex;align-items:center;gap:18px;width:100%;padding:18px 24px;
    background:var(--card);border:1px solid var(--border);border-radius:12px;
    text-decoration:none;color:var(--text);
    transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
    animation:fadeUp 0.5s ease both;position:relative;overflow:hidden;
    cursor:pointer;font-family:inherit;text-align:left}
  .link-btn:hover{border-color:var(--border-hover);background:var(--card-hover);
    transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
  .link-btn.linkedin:hover{border-color:rgba(10,102,194,0.5);box-shadow:0 12px 40px rgba(10,102,194,0.15)}
  .link-btn.email:hover{border-color:rgba(52,211,153,0.5);box-shadow:0 12px 40px rgba(52,211,153,0.15)}
  .link-btn.djinni:hover{border-color:rgba(167,139,250,0.5);box-shadow:0 12px 40px rgba(167,139,250,0.15)}
  .link-btn.cv:hover{border-color:rgba(6,238,255,0.5);box-shadow:0 12px 40px rgba(6,238,255,0.15)}
  .link-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;
    justify-content:center;flex-shrink:0;transition:transform 0.25s}
  .link-btn:hover .link-icon{transform:scale(1.08)}
  .link-icon.linkedin{background:rgba(10,102,194,0.15)}
  .link-icon.email{background:rgba(52,211,153,0.15)}
  .link-icon.djinni{background:rgba(167,139,250,0.15)}
  .link-icon.cv{background:rgba(6,238,255,0.12)}
  .link-info{flex:1;display:flex;flex-direction:column;gap:3px}
  .link-label{font-family:'Datatype',monospace;font-size:16px;font-weight:700;
    color:var(--text);letter-spacing:-0.3px}
  .link-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);
    text-transform:uppercase;letter-spacing:0.08em}
  .link-arrow{font-size:16px;color:var(--muted);transition:all 0.2s;flex-shrink:0}
  .link-btn:hover .link-arrow{color:var(--text);transform:translateX(3px)}
  .footer-note{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);
    text-align:center;text-transform:uppercase;letter-spacing:0.1em;
    animation:fadeUp 0.5s 0.45s ease both}
  .footer-note a{color:var(--accent2);text-decoration:none;transition:opacity 0.2s}
  .footer-note a:hover{opacity:0.7}
  #toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#0E1220;border:1px solid rgba(6,238,255,0.35);color:#E8ECF4;
    font-family:'DM Mono',monospace;font-size:13px;letter-spacing:0.05em;
    padding:14px 24px;border-radius:10px;
    box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 0 1px rgba(6,238,255,0.1);
    display:flex;align-items:center;gap:10px;opacity:0;pointer-events:none;
    transition:opacity 0.3s ease,transform 0.3s ease;z-index:999;white-space:nowrap}
  /* Animation delays — applied to direct children of links-list */
  .links-list > *:nth-child(1){animation:fadeUp 0.5s 0.15s ease both}
  .links-list > *:nth-child(2){animation:fadeUp 0.5s 0.22s ease both}
  .links-list > *:nth-child(3){animation:fadeUp 0.5s 0.29s ease both}
  .links-list > *:nth-child(4){animation:fadeUp 0.5s 0.36s ease both}
  /* Email group: button + copy tag fused into one visual unit */
  .email-group{
    display:flex;flex-direction:column;
    animation:fadeUp 0.5s 0.22s ease both;
  }
  .email-group .link-btn.email{
    border-radius:12px 12px 0 0;
    border-bottom-color:transparent;
    animation:none;
  }
  .email-group .link-btn.email:hover{
    border-bottom-color:transparent;
  }
  .email-copy-tag{
    display:flex;align-items:center;justify-content:space-between;
    width:100%;padding:8px 18px 8px 24px;
    background:rgba(52,211,153,0.04);
    border:1px solid rgba(52,211,153,0.14);
    border-top:1px solid rgba(52,211,153,0.08);
    border-radius:0 0 12px 12px;
    cursor:pointer;
    transition:background 0.2s,border-color 0.2s;
  }
  .email-copy-tag:hover{
    background:rgba(52,211,153,0.09);
    border-color:rgba(52,211,153,0.3);
    border-top-color:rgba(52,211,153,0.12);
  }
  .email-copy-addr{
    font-family:'DM Mono',monospace;font-size:11px;
    color:rgba(52,211,153,0.55);letter-spacing:0.04em;
    user-select:all;
  }
  .email-copy-btn{
    display:flex;align-items:center;gap:5px;
    font-family:'DM Mono',monospace;font-size:10px;
    color:rgba(52,211,153,0.4);text-transform:uppercase;letter-spacing:0.1em;
    transition:color 0.2s;flex-shrink:0;
  }
  .email-copy-tag:hover .email-copy-btn{color:rgba(52,211,153,0.85);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="glow"></div>
<div class="container">
  <a href="index.html" class="back-link">Back to portfolio</a>
  <div class="profile-badge">Available for work</div>
  <div class="profile-name">Petro Osypenko</div>
  <div class="profile-role">Project Manager</div>
  <div class="links-list">

    <a class="link-btn linkedin" href="https://www.linkedin.com/in/petro-o-p" target="_blank" rel="noopener">
      <div class="link-icon linkedin">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z" stroke="#0A66C2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="2" y="9" width="4" height="12" stroke="#0A66C2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="4" cy="4" r="2" stroke="#0A66C2" stroke-width="2"/>
        </svg>
      </div>
      <div class="link-info">
        <span class="link-label">LinkedIn</span>
        <span class="link-sub">Professional profile</span>
      </div>
      <span class="link-arrow">-></span>
    </a>

    <div class="email-group">
      <a class="link-btn email" href="https://mail.google.com/mail/?view=cm&fs=1&to=ospetrpetr90@gmail.com" target="_blank" rel="noopener">
        <div class="link-icon email">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="#34D399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="22,6 12,13 2,6" stroke="#34D399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="link-info">
          <span class="link-label">Write me an email</span>
          <span class="link-sub">Opens Gmail in browser</span>
        </div>
        <span class="link-arrow">-></span>
      </a>
      <div class="email-copy-tag" onclick="copyEmail(event)" title="Click to copy email address">
        <span class="email-copy-addr">ospetrpetr90@gmail.com</span>
        <span class="email-copy-btn">
          <svg id="copyIcon" width="13" height="13" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span id="copyLabel">copy</span>
        </span>
      </div>
    </div>

    <a class="link-btn djinni" href="https://djinni.co/q/59433bef00/" target="_blank" rel="noopener">
      <div class="link-icon djinni">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke="#A78BFA" stroke-width="2"/>
          <path d="M8 12h8M12 8v8" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="link-info">
        <span class="link-label">Djinni</span>
        <span class="link-sub">Job search profile</span>
      </div>
      <span class="link-arrow">-></span>
    </a>

    <button class="link-btn cv" onclick="downloadCV()">
      <div class="link-icon cv">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#06EEFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="14,2 14,8 20,8" stroke="#06EEFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="12" y1="18" x2="12" y2="12" stroke="#06EEFF" stroke-width="2" stroke-linecap="round"/>
          <polyline points="9,15 12,18 15,15" stroke="#06EEFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="link-info">
        <span class="link-label">Download CV</span>
        <span class="link-sub">PDF resume</span>
      </div>
      <span class="link-arrow">-></span>
    </button>

  </div>
  <div class="footer-note">
    <a href="index.html">PM Portfolio</a> &nbsp;&middot;&nbsp; Built on GitHub Pages
  </div>
</div>

<div id="toast">
  <span style="font-size:18px;">&#x2705;</span>
  CV downloading - check your downloads folder &#x2665;
</div>

<script>
function downloadCV() {
  window.open('CV_PM_Petro.pdf', '_blank');
  var toast = document.getElementById('toast');
  toast.style.opacity = '1';
  toast.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(function() {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(-50%) translateY(20px)';
  }, 3500);
}

function copyEmail(e) {
  e.stopPropagation();
  navigator.clipboard.writeText('ospetrpetr90@gmail.com').then(function() {
    var label = document.getElementById('copyLabel');
    var icon = document.getElementById('copyIcon');
    label.textContent = 'copied!';
    icon.innerHTML = '<polyline points="20,6 9,17 4,12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
    setTimeout(function() {
      label.textContent = 'copy';
      icon.innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
    }, 2000);
  });
}
</script>

</body>
</html>
